{{ $encodedUrl := "" }}
{{ $encodedUrlAlt := "" }}

{{ with .Params.link }}
  {{ $encodedUrl = . | base64Encode }}
{{ end }}

{{ with .Params.link_alt }}
  {{ $encodedUrlAlt = . | base64Encode }}
{{ end }}

<div class="download-buttons flex gap-2">
  <button class="download-btn text-base font-medium px-4 py-2 text-white bg-teal-600 hover:bg-teal-700 rounded-lg"
          data-encoded-url="{{ $encodedUrl }}"
          onclick="decodeAndRedirect(this)">
    <i class="fas fa-download mr-2"></i>Download
    <span class="security-badge"><i class="fas fa-shield-alt mr-1"></i>Server-1</span>
  </button>
  
  {{ if $encodedUrlAlt }}
  <button class="download-btn-alt text-base font-medium px-4 py-2 text-white bg-teal-600 hover:bg-teal-700 rounded-lg"
          data-encoded-url="{{ $encodedUrlAlt }}"
          onclick="decodeAndRedirect(this)">
    <i class="fas fa-server mr-2"></i>Download
    <span class="security-badge"><i class="fas fa-shield-alt mr-1"></i>Server-2</span>
  </button>
  {{ end }}
</div>
